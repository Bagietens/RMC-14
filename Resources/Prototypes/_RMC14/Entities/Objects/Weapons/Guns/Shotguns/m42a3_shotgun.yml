- type: entity
  parent: WeaponShotgunM42A2
  name: M42A3 pump shotgun
  id: WeaponShotgunM42A3
  description: Modern as fuck you gotta see it
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/desert.rsi
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/desert.rsi
  - type: Gun
    shotsPerBurst: 1
  - type: ShootUseDelay
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    recoilWielded: 1
    recoilUnwielded: 1
    scatterWielded: 1
    scatterUnwielded: 1
    baseFireRate: 10
    burstScatterMult: 2
  - type: BallisticAmmoProvider
    capacity: 12 # todo change to 9 when bullet chambering is added
    whitelist:
      tags:
      - RMCShellShotgunSupershell
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.25
    accuracyMultiplierUnwielded: 1
  - type: PumpAction
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentBarrelCharger
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentShotgunChoke
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-stock:
        whitelist:
          tags:
          - RMCAttachmentM42A2CollapsibleStock
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentAngledGrip
          - RMCAttachmentFlashlightGrip
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentVerticalGrip
          - RMCAttachmentExtinguisher
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.81, 0.06
      rmc-aslot-rail: -0.025, 0.125
      rmc-aslot-stock: -0.40625, 0.03125
      rmc-aslot-underbarrel: 0.25, -0.31
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/jungle.rsi
      Desert: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/desert.rsi
      Snow: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/snow.rsi
      Classic: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/classic.rsi
      Urban: _RMC14/Objects/Weapons/Guns/Shotguns/m42a2/urban.rsi
  - type: Tag
    tags:
    - RMCWeaponShotgunM42A2
    - RMCWeaponShotgun

- type: entity
  parent: WeaponShotgunM42A3
  id: RMCWeaponShotgunM42A3Filled
  suffix: Filled
  components:
  - type: BallisticAmmoProvider
    proto: CMShellShotgunSupershell

